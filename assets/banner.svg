<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117" />
      <stop offset="100%" style="stop-color:#161b22" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff" />
      <stop offset="100%" style="stop-color:#1f6feb" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" rx="10" fill="url(#bg)" stroke="#30363d" stroke-width="1" />

  <!-- Left: icon-like lineage hint -->
  <g transform="translate(40, 55)">
    <circle cx="0" cy="0" r="5" fill="#58a6ff" opacity="0.4" />
    <circle cx="0" cy="25" r="5" fill="#58a6ff" opacity="0.4" />
    <circle cx="0" cy="50" r="5" fill="#58a6ff" opacity="0.4" />
    <line x1="0" y1="5" x2="0" y2="20" stroke="#58a6ff" stroke-width="1" opacity="0.3" />
    <line x1="0" y1="30" x2="0" y2="45" stroke="#58a6ff" stroke-width="1" opacity="0.3" />
  </g>

  <!-- Title -->
  <text x="70" y="78" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600">Apache Atlas <tspan fill="url(#accent)">MCP Server</tspan></text>

  <!-- Subtitle -->
  <text x="70" y="105" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="13">Connect LLM agents to your metadata governance platform</text>

  <!-- Tags -->
  <g transform="translate(70, 118)" font-family="monospace" font-size="10">
    <rect x="0" y="0" width="56" height="20" rx="10" fill="#58a6ff" fill-opacity="0.08" stroke="#58a6ff" stroke-width="0.5" stroke-opacity="0.2" />
    <text x="28" y="14" text-anchor="middle" fill="#58a6ff">search</text>

    <rect x="64" y="0" width="60" height="20" rx="10" fill="#58a6ff" fill-opacity="0.08" stroke="#58a6ff" stroke-width="0.5" stroke-opacity="0.2" />
    <text x="94" y="14" text-anchor="middle" fill="#58a6ff">lineage</text>

    <rect x="132" y="0" width="68" height="20" rx="10" fill="#58a6ff" fill-opacity="0.08" stroke="#58a6ff" stroke-width="0.5" stroke-opacity="0.2" />
    <text x="166" y="14" text-anchor="middle" fill="#58a6ff">glossary</text>

    <rect x="208" y="0" width="52" height="20" rx="10" fill="#58a6ff" fill-opacity="0.08" stroke="#58a6ff" stroke-width="0.5" stroke-opacity="0.2" />
    <text x="234" y="14" text-anchor="middle" fill="#58a6ff">types</text>
  </g>
</svg>
